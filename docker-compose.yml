services:
  storage:
    image: 'rustfs/rustfs:1.0.0-alpha.94'
    container_name: rustfs_local
    restart: always
    ports:
      - 127.0.0.1:${STORAGE_ACCESS_PORT}:9000
    volumes:
      - ./mnt/rustfs/data:/data:rw
    environment:
      - RUSTFS_ACCESS_KEY=${STORAGE_ACCESS_KEY}
      - RUSTFS_SECRET_KEY=${STORAGE_SECRET_KEY}
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 2GB

  redis:
    image: redis:8.6-alpine
    container_name: redis.8.6
    restart: always
    ports:
      - 127.0.0.1:${DB_REDIS_PORT}:6379
    command: redis-server --appendonly yes --maxmemory 2gb --maxmemory-policy allkeys-lfu --tcp-keepalive 60
    volumes:
      - ./mnt/redis/data:/data
    deploy:
      resources:
        reservations:
          memory: 1GB
    depends_on:
      - storage

  database:
    container_name: postgres.18.3
    image: postgres:18.3-alpine3.22
    restart: always
    shm_size: 4gb
    ports:
      - 127.0.0.1:${DB_POSTGRES_PORT}:5432
    environment:
      - POSTGRES_USER=${DB_POSTGRES_USER}
      - POSTGRES_PASSWORD=${DB_POSTGRES_PASSWORD}
      - PGDATA=/var/lib/postgresql/data/pgdata
    command: postgres -c shared_buffers=4GB -c effective_cache_size=12GB -c work_mem=64MB -c maintenance_work_mem=512MB -c min_wal_size=1GB -c max_wal_size=4GB -c checkpoint_completion_target=0.9 -c random_page_cost=1.1 -c effective_io_concurrency=200 -c max_connections=300 -c max_worker_processes=4 -c max_parallel_workers_per_gather=2
    volumes:
      - ./mnt/postgres/data:/var/lib/postgresql/data
    depends_on:
      - redis
      - storage
